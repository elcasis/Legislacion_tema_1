<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Protección de Datos</title>

<style>
:root {
    --bg: #0d1117;
    --card: #161b22;
    --text: #c9d1d9;
    --muted: #8b949e;
    --accent: #58a6ff;
    --success: #3fb950;
    --error: #f85149;
    --border: #30363d;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Segoe UI, sans-serif;
}

body {
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
}

.container {
    width: 100%;
    max-width: 800px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 30px;
}

h1 {
    text-align: center;
    margin-bottom: 10px;
    color: var(--accent);
}

.subtitle {
    text-align: center;
    color: var(--muted);
    margin-bottom: 25px;
}

.progress-container {
    width: 100%;
    height: 12px;
    background: #000;
    border-radius: 10px;
    overflow: hidden;
    margin-bottom: 20px;
}

.progress-bar {
    height: 100%;
    width: 0%;
    background: var(--accent);
    transition: .3s;
}

.stats {
    display: flex;
    justify-content: space-between;
    margin-bottom: 20px;
}

.question-text {
    font-size: 1.1rem;
    margin-bottom: 20px;
    line-height: 1.5;
}

.options {
    display: flex;
    flex-direction: column;
    gap: 12px;
}

.option-btn {
    background: var(--bg);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px;
    cursor: pointer;
    transition: .2s;
    text-align: left;
}

.option-btn:hover:not(:disabled) {
    border-color: var(--accent);
}

.correct {
    background: rgba(63, 185, 80, .2) !important;
    border-color: var(--success) !important;
    color: var(--success) !important;
}

.incorrect {
    background: rgba(248, 81, 73, .2) !important;
    border-color: var(--error) !important;
    color: var(--error) !important;
}

.feedback {
    margin-top: 20px;
    padding: 15px;
    border-radius: 10px;
    display: none;
    line-height: 1.4;
}

.feedback.show {
    display: block;
}

.correct-bg {
    background: rgba(63, 185, 80, .1);
    border: 1px solid var(--success);
}

.incorrect-bg {
    background: rgba(248, 81, 73, .1);
    border: 1px solid var(--error);
}

.actions {
    display: flex;
    gap: 10px;
    margin-top: 20px;
}

.btn {
    border: none;
    padding: 14px;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
}

.next-btn {
    flex: 2;
    background: var(--accent);
    color: var(--bg);
}

.exit-btn {
    flex: 1;
    background: #222;
    color: var(--error);
}

.mode-options {
    display: flex;
    flex-direction: column;
    gap: 15px;
    margin-top: 20px;
}

.mode-btn {
    padding: 15px;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 8px;
    cursor: pointer;
    font-size: 1rem;
    text-align: left;
}

.mode-btn:hover {
    border-color: var(--accent);
}

.end-screen {
    text-align: center;
}

.final-score {
    margin: 20px 0;
    font-size: 1.2rem;
    line-height: 1.5;
}
</style>
</head>

<body>

<div class="container">

    <div id="setup-screen">
        <h1>🛡️ Protección de Datos</h1>
        <p class="subtitle">
            Elige un modo de juego (Preguntas aleatorias sin repetición)
        </p>

        <div class="mode-options">
            <button class="mode-btn" onclick="startGame(10)">
                ☕ Partida corta (10 Preguntas)
            </button>

            <button class="mode-btn" onclick="startGame(20)">
                ⚖️ Examen medio (20 Preguntas)
            </button>

            <button class="mode-btn" onclick="startGame(40)">
                🔥 Desafío completo (40 Preguntas)
            </button>
        </div>
    </div>

    <div id="game-screen" style="display:none;">

        <h1>📚 Quiz RGPD</h1>

        <div class="progress-container">
            <div class="progress-bar" id="progress-bar"></div>
        </div>

        <div class="stats">
            <div id="counter">1/10</div>
            <div>Puntos: <span id="score">0</span></div>
        </div>

        <div class="question-text" id="question-text"></div>

        <div class="options" id="options-container"></div>

        <div class="feedback" id="feedback"></div>

        <div class="actions">
            <button class="btn exit-btn" onclick="returnMenu()">
                Salir
            </button>

            <button class="btn next-btn" id="next-btn" style="display:none;">
                Siguiente
            </button>
        </div>

    </div>

    <div id="end-screen" class="end-screen" style="display:none;">
        <h1 id="end-title">🏁 Fin</h1>

        <div class="final-score" id="final-score"></div>

        <button class="btn next-btn" onclick="returnMenu()">
            Volver al menú
        </button>
    </div>

</div>

<script>

/* =========================
   ELEMENTOS HTML
========================= */

const setupScreen = document.getElementById("setup-screen");
const gameScreen = document.getElementById("game-screen");
const endScreen = document.getElementById("end-screen");

const progressBar = document.getElementById("progress-bar");
const counter = document.getElementById("counter");
const scoreSpan = document.getElementById("score");

const questionText = document.getElementById("question-text");
const optionsContainer = document.getElementById("options-container");

const feedback = document.getElementById("feedback");
const nextBtn = document.getElementById("next-btn");

const endTitle = document.getElementById("end-title");
const finalScore = document.getElementById("final-score");

/* =========================
   PREGUNTAS
========================= */

const allQuestions = [
    {
        question: "⚖️ ¿Cuál es la naturaleza jurídica del derecho fundamental a la protección de datos personales en el ordenamiento español?",
        options: [
            "Es un derecho que depende jerárquicamente del derecho al honor corporativo.",
            "Es un derecho fundamental plenamente autónomo e independiente del derecho a la intimidad.",
            "Es una mera extensión de la ley ordinaria de telecomunicaciones.",
            "Es un derecho supeditado exclusivamente al derecho a la intimidad familiar."
        ],
        correct: 1,
        explanation: "El Tribunal Constitucional determinó que es independiente del derecho a la intimidad porque persiguen fines distintos: la intimidad protege el ámbito exclusivo; la protección de datos otorga el poder de control sobre los datos personales."
    },
    {
        question: "📁 Según el RGPD, ¿qué constituye exactamente un 'dato de carácter personal'?",
        options: [
            "Toda información comercial perteneciente a personas jurídicas legalmente constituidas.",
            "Toda información sobre una persona física identificada o identificable.",
            "Exclusivamente los registros de antecedentes penales de los usuarios.",
            "Únicamente los identificadores biométricos encriptados en hardware."
        ],
        correct: 1,
        explanation: "El artículo 4.1 del RGPD define el dato personal como toda información sobre una persona física identificada o identificable, excluyendo expresamente a las personas jurídicas."
    },
    {
        question: "🧠 ¿Qué significa el principio de 'responsabilidad proactiva' para el responsable de un tratamiento?",
        options: [
            "Que debe externalizar obligatoriamente la auditoría informática a un tercero.",
            "Que debe ser responsable del cumplimiento de los principios de protección de datos y ser capaz de demostrarlo.",
            "Que solo actúa cuando recibe una sanción formal por parte de la AEPD.",
            "Que debe responder las solicitudes de los usuarios en menos de 24 horas."
        ],
        correct: 1,
        explanation: "La responsabilidad proactiva exige que el responsable no solo cumpla pasivamente los principios, sino que tenga mecanismos auditables para demostrar dicho cumplimiento."
    },
    {
        question: "💻 ¿A qué tipo de información NO se le aplica el marco regulatorio del RGPD ni de la LOPDGDD?",
        options: [
            "A los datos de localización geográfica de un usuario móvil.",
            "Al tratamiento de datos referentes a personas jurídicas (empresas/organizaciones).",
            "A las direcciones IP estáticas asignadas a particulares.",
            "A los identificadores de seudonimización de clientes."
        ],
        correct: 1,
        explanation: "Las normativas de protección de datos protegen a las personas físicas. El tratamiento de datos de personas jurídicas queda totalmente excluido de su ámbito de aplicación."
    },
    {
        question: "🎯 ¿En qué consiste el principio de 'limitación de la finalidad' del tratamiento de datos?",
        options: [
            "En almacenar los datos en un único servidor local centralizado.",
            "En recoger los datos con fines determinados, explícitos y legítimos, prohibiendo un tratamiento ulterior incompatible.",
            "En limitar la cantidad de datos que los empleados pueden visualizar en pantalla.",
            "En borrar automáticamente todos los registros del sistema cada 30 días."
        ],
        correct: 1,
        explanation: "Los datos se capturan para un fin concreto y legítimo y no pueden usarse después para propósitos distintos o incompatibles con los originales."
    },
    {
        question: "🛠️ ¿Cuál es la función definitoria que ostenta el 'Responsable del tratamiento'?",
        options: [
            "Es el técnico encargado de realizar las copias de seguridad de la base de datos.",
            "Es la persona física o jurídica, autoridad pública u organismo que determina los fines y los medios del tratamiento.",
            "Es la empresa externa que presta servicios informáticos de soporte de red.",
            "Es el empleado contratado para responder de forma única las reclamaciones de los clientes."
        ],
        correct: 1,
        explanation: "Lo que define al Responsable es su capacidad de decisión soberana sobre el objeto, el fin, el contenido y la utilización del tratamiento de datos."
    },
    {
        question: "🤝 ¿Cómo se define el rol del 'Encargado del tratamiento' dentro del ecosistema normativo?",
        options: [
            "Es el propietario legal absoluto de los ficheros de datos personales.",
            "Es la persona física o jurídica que trata datos personales por cuenta del responsable del tratamiento.",
            "Es la autoridad pública que sanciona los incidentes de ciberseguridad.",
            "Es el propio interesado cuyos datos de carácter sensible se procesan en la plataforma."
        ],
        correct: 1,
        explanation: "El encargado es un tercero que presta un servicio al responsable y que, para ejecutarlo, necesita tratar los datos bajo las directrices y cuenta de dicho responsable."
    },
    {
        question: "⏱️ Como regla general, ¿cuál es el plazo máximo que tiene el responsable para responder a los derechos de los interesados?",
        options: [
            "Un plazo improrrogable de 72 horas desde la recepción de la solicitud.",
            "El plazo de un mes, el cual es prorrogable hasta dos meses más por complejidad o volumen.",
            "Fijamente 15 días hábiles según el código civil ordinario.",
            "Seis meses naturales desde que se registra la petición electrónica."
        ],
        correct: 1,
        explanation: "El RGPD impone la obligación de responder en el plazo de un mes, permitiendo una prórroga de dos meses adicionales si la solicitud es compleja o masiva."
    },
    {
        question: "🚨 Ante una violación de seguridad de datos que suponga un riesgo para los derechos de las personas, ¿de qué plazo dispone el responsable para notificar a la autoridad de control?",
        options: [
            "Sin dilación indebida y, de ser posible, a más tardar 72 horas después de que haya tenido constancia de ella.",
            "Exactamente 24 horas naturales desde que ocurrió el ciberataque técnico.",
            "Un plazo flexible de 7 días hábiles de auditoría interna.",
            "No hay plazo fijo, basta con incluirlo en el informe anual de seguridad."
        ],
        correct: 0,
        explanation: "El artículo 33 del RGPD fija un umbral estricto de un máximo de 72 horas para notificar la brecha a la autoridad de control desde que se tenga constancia de su existencia."
    },
    {
        question: "🔏 Si los datos afectados en una brecha de seguridad contaban con medidas técnicas como el cifrado robusto que los hace ininteligibles para intrusos, ¿qué ocurre con la comunicación al interesado?",
        options: [
            "Debe realizarse de forma obligatoria mediante burofax del estado.",
            "La comunicación al interesado no será necesaria por mitigación efectiva del alto riesgo.",
            "El responsable debe ser sancionado de manera inmediata sin derecho a defensa.",
            "Se debe publicar de forma obligatoria en el Boletín Oficial del Estado."
        ],
        correct: 1,
        explanation: "Si los datos están fuertemente encriptados, el atacante no puede leerlos. Al no existir una probabilidad real de alto riesgo para el ciudadano, la ley exime de notificarle directamente."
    },
    {
        question: "🛡️ ¿Cuál de las siguientes opciones describe una de las 'categorías especiales de datos' (datos sensibles) según el artículo 9 del RGPD?",
        options: [
            "El saldo bancario actual y el historial de transacciones financieras ordinarias.",
            "Los datos que revelen el origen étnico o racial, las opiniones políticas, convicciones religiosas, datos genéticos y biométricos unívocos.",
            "La dirección de correo electrónico institucional y el puesto de trabajo técnico.",
            "Las marcas de dispositivos móviles y direcciones MAC utilizadas por los clientes."
        ],
        correct: 1,
        explanation: "Las categorías especiales de datos abarcan información íntima y de alta sensibilidad (origen racial, afiliación sindical, salud, orientación sexual, datos biométricos e ideología)."
    },
    {
        question: "📝 ¿Qué contenido mínimo debe tener el Registro de Actividades del Tratamiento (RAT) del encargado del tratamiento, a diferencia del responsable?",
        options: [
            "Debe incluir obligatoriamente el presupuesto financiero del sistema de copias de seguridad.",
            "Su contenido es menor: incluye datos de contacto del encargado y responsables, categorías de tratamientos por cuenta de cada responsable y transferencias internacionales.",
            "Exclusivamente las contraseñas cifradas de los administradores de sistemas.",
            "El RAT del encargado es exactamente idéntico en tamaño y campos al del responsable."
        ],
        correct: 1,
        explanation: "Al operar por cuenta ajena, el RAT del encargado es más reducido y se enfoca en las categorías de servicios prestados a cada responsable de fichero."
    },
    {
        question: "🚫 ¿Qué derecho faculta a un ciudadano a exigir que sus datos personales dejen de utilizarse de forma inmediata para fines de marketing directo o publicidad?",
        options: [
            "Derecho de limitación del tratamiento físico.",
            "Derecho de supresión anticipada.",
            "Derecho de oposición.",
            "Derecho de portabilidad automatizada."
        ],
        correct: 2,
        explanation: "El derecho de oposición permite al interesado detener tratamientos específicos basados en su situación o, de forma absoluta, cuando el fin sea la publicidad o marketing."
    },
    {
        question: "🧩 ¿Qué es la 'autodeterminación informativa' según la doctrina jurisprudencial del Tribunal Constitucional?",
        options: [
            "El derecho de las operadoras de red a fijar las tarifas de tráfico de datos.",
            "La facultad de los ciudadanos de controlar sus datos personales, decidir cuáles transfieren a terceros y conocer su vida útil.",
            "La automatización obligatoria de los sistemas lógicos mediante IA.",
            "La soberanía estatal para bloquear el acceso internacional a Internet."
        ],
        correct: 1,
        explanation: "Es el núcleo fundamental de la protección de datos: el poder jurídico del ciudadano para gobernar su información, sea íntima o no."
    },
    {
        question: "📋 La LOPDGDD introdujo el 'sistema por capas' para cumplir con el deber de información. ¿Qué elemento es obligatorio incluir en la primera capa o capa básica?",
        options: [
            "El código fuente íntegro del sistema de cifrado informático.",
            "La identidad del responsable, la finalidad del tratamiento y la posibilidad de ejercer los derechos lógicos.",
            "La lista detallada de todos los empleados con acceso a los sistemas.",
            "El contrato de prestación de servicios firmado con el encargado."
        ],
        correct: 1,
        explanation: "La capa básica (artículo 11 LOPDGDD) debe ser clara y directa, mostrando quién trata los datos, para qué y cómo el ciudadano puede ejercer sus derechos."
    },
    {
        question: "🔍 Si los datos personales NO se obtienen directamente del interesado, sino de un tercero, ¿de qué plazo dispone el responsable para cumplir con el deber de información?",
        options: [
            "Debe informarle en un plazo razonable, que no supere en ningún caso el mes de duración.",
            "De forma inmediata en los primeros 10 segundos del volcado de base de datos.",
            "Exactamente a las 72 horas de registrar la clave externa.",
            "No tiene obligación de informar si los datos provienen de una fuente comercial externa."
        ],
        correct: 0,
        explanation: "El artículo 14 del RGPD estipula que si los datos provienen de un tercero, se debe informar al afectado en un plazo razonable que no exceda de un mes."
    },
    {
        question: "💰 ¿Bajo qué circunstancias puede el responsable del tratamiento cobrar un canon financiero por tramitar un derecho de acceso?",
        options: [
            "En todos los casos, dado que el RGPD establece que los derechos son costosos de mantener.",
            "Cuando las solicitudes sean manifiestamente infundadas o excesivas, especialmente debido a su carácter repetitivo.",
            "Solo cuando el usuario solicite la información en un formato de papel certificado.",
            "Únicamente si el interesado pertenece a una persona jurídica internacional."
        ],
        correct: 1,
        explanation: "El ejercicio de derechos es gratuito. El cobro de un canon proporcional o la negativa a actuar son excepciones lícitas exclusivas ante solicitudes abusivas o repetitivas."
    },
    {
        question: "🔗 ¿Cuáles son las dos tipologías de medidas de seguridad exigidas de forma conjunta por la normativa de protección de datos personales?",
        options: [
            "Medidas de índole administrativa e índole policial.",
            "Medidas de índole técnica y organizativa.",
            "Medidas puramente automatizadas e interfaces gráficas.",
            "Restricciones de red y cortafuegos de hardware exclusivamente."
        ],
        correct: 1,
        explanation: "El cumplimiento de seguridad exige un enfoque dual: medidas técnicas (cifrado, firewalls, control de accesos) y organizativas (políticas, concienciación, RAT)."
    },
    {
        question: "👨‍💼 ¿En qué supuesto organizativo es estrictamente OBLIGATORIO designar a un Delegado de Protección de Datos (DPD)?",
        options: [
            "En cualquier PYME con más de tres empleados contratados.",
            "Cuando el tratamiento sea realizado por una autoridad u organismo público (salvo tribunales en función judicial).",
            "Únicamente en empresas que desarrollen videojuegos indie independientes.",
            "En organizaciones que procesen exclusivamente datos lógicos comerciales de personas jurídicas."
        ],
        correct: 1,
        explanation: "El artículo 37.1 del RGPD fija los casos obligatorios: organismos públicos, entidades cuyas actividades principales requieran monitorización a gran escala, o tratamientos masivos de datos sensibles."
    },
    {
        question: "📜 ¿Qué titulación o requisito formal exige el RGPD para poder ser nombrado Delegado de Protección de Datos?",
        options: [
            "Estar en posesión de un doctorado en ingeniería de sistemas lógicos de seguridad.",
            "Contar con cualidades profesionales, conocimientos especializados del Derecho y la práctica en la materia.",
            "Disponer obligatoriamente de la certificación oficial emitida de forma exclusiva por la ENAC.",
            "Haber ejercido como magistrado del Tribunal Constitucional durante cinco años."
        ],
        correct: 1,
        explanation: "El RGPD no exige una certificación obligatoria; se basa en las cualidades profesionales y la especialización demostrable en derecho y práctica de protección de datos."
    },
    {
        question: "📌 ¿En qué supuesto legal el tratamiento de datos se considera lícito por la existencia de una 'Relación Contractual'?",
        options: [
            "Cuando el tratamiento es necesario para la ejecución de un contrato en el que el interesado es parte o para medidas precontractuales.",
            "Cuando el usuario firma un documento aceptando recibir correos publicitarios masivos perpetuos.",
            "Cuando se realiza una transferencia internacional de activos financieros a un tercer país sin control.",
            "Cuando el responsable del tratamiento tiene pérdidas económicas en su ejercicio contable."
        ],
        correct: 0,
        explanation: "La relación contractual legitima el tratamiento de datos esenciales para desplegar el servicio solicitado por el cliente (ej. la dirección para entregar una compra)."
    },
    {
        question: "🧬 Si un hospital trata los datos personales de un paciente inconsciente que ha ingresado de urgencia médica para salvar su vida, ¿cuál es la base jurídica de licitud?",
        options: [
            "El consentimiento explícito digital firmado por el paciente.",
            "La satisfacción de los intereses legítimos comerciales del centro hospitalario.",
            "El tratamiento es necesario para proteger intereses vitales del interesado o de otra persona física.",
            "El derecho al testamento digital anticipado."
        ],
        correct: 2,
        explanation: "Los intereses vitales amparan la licitud del tratamiento cuando está en peligro inminente la supervivencia física del interesado y este no puede otorgar consentimiento."
    },
    {
        question: "🚨 ¿A quién debe notificar un 'Encargado del tratamiento' si detecta una brecha de seguridad informática en los sistemas que administra?",
        options: [
            "Directamente a los interesados individuales a través de medios electrónicos.",
            "Al responsable del tratamiento de forma inmediata y sin dilación indebida.",
            "A la Agencia Española de Protección de Datos de forma independiente.",
            "Al delegado del gobierno de la comunidad autónoma correspondiente."
        ],
        correct: 1,
        explanation: "El encargado no tiene la potestad ni el vínculo legal para ir a la autoridad de control o al ciudadano; su deber estricto es reportar el fallo al Responsable del tratamiento."
    },
    {
        question: "📊 ¿Qué es una Evaluación de Impacto relativa a la Protección de Datos (EIPD)?",
        options: [
            "Una auditoría financiera para valorar el coste de los equipos de almacenamiento físico.",
            "Un proceso para identificar y abordar posibles riesgos de tratamientos de datos que puedan entrañar un alto riesgo para los derechos y libertades.",
            "Un test de penetración de red llevado a cabo por un hacker ético externo.",
            "El documento donde se recogen las amonestaciones de la autoridad de control."
        ],
        correct: 1,
        explanation: "Bajo la supervisión del DPD, la EIPD es un análisis preventivo obligatorio para tratamientos de alto riesgo que busca mitigar los peligros antes de iniciar el procesamiento."
    },
    {
        question: "⚖️ ¿Qué novedad legislativa singular e histórica introdujo el Título X de la Ley Orgánica española 3/2018 (LOPDGDD)?",
        options: [
            "La creación de la infraestructura de ciberseguridad del estado español.",
            "El catálogo y reconocimiento explícito de los nuevos derechos digitales de la ciudadanía.",
            "La prohibición absoluta del uso de dispositivos digitales en entornos corporativos.",
            "La regulación de las penas de prisión por delitos de revelación de secretos."
        ],
        correct: 1,
        explanation: "La LOPDGDD española dio un paso al frente al añadir al marco clásico de protección de datos un bloque entero (Título X) dedicado a los derechos digitales de los ciudadanos."
    },
    {
        question: "🌐 ¿Qué garantiza exactamente el denominado 'Derecho a la neutralidad de Internet' recogido en el artículo 80 de la LOPDGDD?",
        options: [
            "El acceso gratuito a todos los servicios de streaming comerciales internacionales.",

/* =========================
   VARIABLES
========================= */

let questions = [];
let currentIndex = 0;
let score = 0;
let answered = false;
let maxQuestionsTarget = 10;
let currentShuffledOptions = [];

/* =========================
   FUNCIONES
========================= */

// Función de mezcla in-place segura sin referencias cruzadas
function secureShuffle(array) {
    let currentIndex = array.length, randomIndex;
    while (currentIndex !== 0) {
        randomIndex = Math.floor(Math.random() * currentIndex);
        currentIndex--;
        let temp = array[currentIndex];
        array[currentIndex] = array[randomIndex];
        array[randomIndex] = temp;
    }
    return array;
}

function startGame(total) {
    maxQuestionsTarget = total;
    currentIndex = 0;
    score = 0;

    // Barajamos un pool de índices para aislar completamente las referencias de los objetos
    let indices = [];
    for (let i = 0; i < allQuestions.length; i++) {
        indices.push(i);
    }
    secureShuffle(indices);

    // Creamos la lista específica de la partida
    questions = [];
    for (let j = 0; j < maxQuestionsTarget; j++) {
        let targetIndex = indices[j];
        questions.push(allQuestions[targetIndex]);
    }

    setupScreen.style.display = "none";
    endScreen.style.display = "none";
    gameScreen.style.display = "block";

    loadQuestion();
}

function loadQuestion() {
    answered = false;
    nextBtn.style.display = "none";

    feedback.className = "feedback";
    feedback.innerHTML = "";

    const q = questions[currentIndex];
    questionText.innerHTML = q.question;
    counter.innerHTML = `${currentIndex + 1}/${questions.length}`;
    scoreSpan.innerHTML = score;

    progressBar.style.width = `${(currentIndex / questions.length) * 100}%`;
    optionsContainer.innerHTML = "";

    // Mapeamos las opciones guardando el valor real de su veracidad original
    let optionsMapped = [];
    for (let k = 0; k < q.options.length; k++) {
        optionsMapped.push({
            text: q.options[k],
            isCorrect: k === q.correct
        });
    }

    // Mezclamos la copia local de las opciones
    currentShuffledOptions = secureShuffle(optionsMapped);

    // Renderizamos los botones e inyectamos los eventos vinculando su posición mezclada
    currentShuffledOptions.forEach((optionObj, index) => {
        const btn = document.createElement("button");
        btn.className = "option-btn";
        btn.innerHTML = `<span style="font-family:'JetBrains Mono',monospace; background:rgba(255,255,255,0.05); padding:2px 6px; border-radius:4px; margin-right:8px;">${String.fromCharCode(65 + index)}</span> ${optionObj.text}`;
        btn.onclick = () => checkAnswer(index, btn);
        optionsContainer.appendChild(btn);
    });
}

function checkAnswer(selectedIndex, selectedButton) {
    if (answered) return;
    answered = true;

    const allButtons = optionsContainer.querySelectorAll(".option-btn");
    allButtons.forEach(b => b.disabled = true);

    // Buscamos cuál es el botón correcto en el orden aleatorio actual y lo iluminamos
    let correctButtonIndex = currentShuffledOptions.findIndex(opt => opt.isCorrect);
    allButtons[correctButtonIndex].classList.add("correct");

    if (currentShuffledOptions[selectedIndex].isCorrect) {
        score += 10;
        scoreSpan.innerHTML = score;
        feedback.className = "feedback show correct-bg";
        feedback.innerHTML = `<strong>🎉 ¡Cumplimiento Validado! Excelente ciberabogado.</strong><br><br>${questions[currentIndex].explanation}`;
    } else {
        selectedButton.classList.add("incorrect");
        feedback.className = "feedback show incorrect-bg";
        feedback.innerHTML = `<strong>❌ ¡Infracción Detectada! Riesgo de sanción administrativa.</strong><br><br>${questions[currentIndex].explanation}`;
    }

    nextBtn.style.display = "block";
}

nextBtn.addEventListener("click", () => {
    currentIndex++;
    if (currentIndex < questions.length) {
        loadQuestion();
    } else {
        showEnd();
    }
});

function showEnd() {
    gameScreen.style.display = "none";
    endScreen.style.display = "block";

    const max = questions.length * 10;
    const percent = Math.round((score / max) * 100);

    if (percent >= 90) {
        endTitle.innerHTML = "🏆 Nivel: Oficial de Cumplimiento de Élite";
    } else if (percent >= 70) {
        endTitle.innerHTML = "👍 Nivel: Apto para Gestión Corporativa";
    } else {
        endTitle.innerHTML = "📚 Alerta de No Conformidad (Repaso Requerido)";
    }

    finalScore.innerHTML = `Puntuación final: <strong>${score}</strong> / ${max} puntos.<br>Porcentaje de acierto normativo: <strong>${percent}%</strong>`;
}

function returnMenu() {
    gameScreen.style.display = "none";
    endScreen.style.display = "none";
    setupScreen.style.display = "block";
}
</script>
